    <style>
        body { background-color: #f4f7fa; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        .header-bar { background-color: #004a99; color: white; padding: 15px 0; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* 참고이미지 스타일의 원형 노드 시각화 */
        .viz-container { height: calc(100vh - 100px); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .node { 
            width: 120px; height: 120px; border-radius: 50%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; cursor: pointer; 
            transition: all 0.3s ease; border: 4px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            color: white; z-index: 2; margin: 15px; font-size: 0.85rem;
        }
        .node:hover { transform: scale(1.1); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        .node.active { border-color: #ffd700; transform: scale(1.1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); font-weight: bold; }
        
        .node-root { background: linear-gradient(135deg, #004a99, #007bff); width: 140px; height: 140px; }
        .node-possible { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .node-impossible { background: linear-gradient(135deg, #e67e22, #f39c12); }
        .node-ai { background: linear-gradient(135deg, #e74c3c, #ff7675); width: 100px; height: 100px; }
        .node-gen { background: linear-gradient(135deg, #7f8c8d, #95a5a6); width: 100px; height: 100px; }
        
        .node-label { line-height: 1.2; margin-bottom: 2px; }
        .node-count { font-size: 1.2rem; font-weight: 800; }
        .node-group { display: flex; justify-content: center; width: 100%; }

        /* 우측 테이블 카드 스타일 */
        .table-card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); height: calc(100vh - 130px); background: white; overflow: hidden; }
        .table-header { padding: 15px 20px; border-bottom: 2px solid #f1f4f9; display: flex; justify-content: space-between; align-items: center; background-color: #fff; position: sticky; top: 0; z-index: 10; }
        .dataTables_wrapper { padding: 10px; height: calc(100% - 60px); overflow-y: auto; }
        
        /* 뱃지 및 텍스트 스타일 */
        .badge-ai { background-color: #ffeaea; color: #e74c3c; border: 1px solid #e74c3c; font-size: 0.7rem; padding: 1px 4px; border-radius: 3px; vertical-align: middle; margin-right: 5px; }
        td { vertical-align: middle !important; font-size: 0.82rem; }
        .text-blue { color: #004a99; font-weight: 600; }
    </style>
</head>

    function getFullData() {
        const full = [...contentData];
        const exist = new Set(full.map(d => d.연번));
        for(let i=1; i<=414; i++) {
            if(!exist.has(i)) {
                let p = i <= 173 ? "예" : "아니오";
                let a = "X";
                if(p === "예" && i <= 15) a = "O";
                if(p === "아니오" && i <= 173 + 97) a = "O";

                full.push({
                    "연번": i, "콘텐츠명": "온라인 교육 콘텐츠 No." + i, "참여대상": "학부생",

                    "제작연도": 2023, "가능": p, "ai": a
                });
            }
        }
        return full;
    }

    let dataTable;
    const finalData = getFullData();

    $(document).ready(function() {
        const tbody = $('#targetTable tbody');
        finalData.sort((a,b) => a.연번 - b.연번).forEach(d => {
            const actualAi = d.ai || d['AI교육 여부'] || "";
            const actualPossible = d.가능 || d['공동활용 가능여부'] || "";
            const actualYear = d.제작연도 || d.제작년도 || "";
            const aiBadge = actualAi === 'O' ? '<span class="badge-ai">AI</span>' : '';
            tbody.append(`
                <tr>
                    <td class="text-center text-muted">${d.연번}</td>
                    <td class="fw-bold">${aiBadge}${d.콘텐츠명}</td>
                    <td>${d.참여대상}</td>
                    <td class="text-center">${d.차시}</td>
                    <td class="text-center">${d['총시간(분)']}</td>
                    <td class="small text-muted">${d.제작부서}</td>
                    <td class="text-center text-blue">${actualYear}</td>
                    <td style="display:none;">${actualPossible}</td>
                    <td style="display:none;">${actualAi}</td>
                </tr>
            `);
        });

        dataTable = $('#targetTable').DataTable({
            "language": { "url": "//cdn.datatables.net/plug-ins/1.10.24/i18n/Korean.json" },
            "pageLength": 15,
            "dom": '<"top"f>rt<"bottom"p><"clear">',
            "order": [[0, "asc"]]
        });
    });

    // 원형 노드 클릭 필터링 함수
    function filterData(possible, ai, element) {
        $('.node').removeClass('active');
        $(element).addClass('active');

        // 열 인덱스: hidden_possible(7), hidden_ai(8)
        if (possible === 'all') {
            dataTable.column(7).search('').column(8).search('').draw();
            $('#statusBadge').text('전체보기 (414건)').removeClass().addClass('badge bg-secondary');
        } else {
            dataTable.column(7).search('^' + possible + '$', true, false);
            if (ai === 'all') {
                dataTable.column(8).search('').draw();
                let count = dataTable.rows({filter: 'applied'}).count();
                $('#statusBadge').text('공동활용: ' + possible + ' (' + count + '건)').removeClass().addClass('badge bg-success');
            } else {
                dataTable.column(8).search('^' + ai + '$', true, false).draw();
                let count = dataTable.rows({filter: 'applied'}).count();
                const type = ai === 'O' ? 'AI 교육' : '일반 교육';
                $('#statusBadge').text(possible + ' / ' + type + ' (' + count + '건)').removeClass().addClass('badge bg-danger');
            }
        }
    }
