<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육혁신처 온라인콘텐츠 네트워크 시각화</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: #1e1e1e; }
        header { background-color: #2d2d2d; color: #e0e0e0; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        header h1 { margin: 0; font-size: 1.2rem; }
        .container { display: flex; flex: 1; overflow: hidden; }
        #mindmap-area { flex: 7; background-color: #1e1e1e; border-right: 1px solid #444; position: relative; }
        #detail-area { flex: 3; padding: 20px; background-color: #252525; color: #e0e0e0; overflow-y: auto; }
        .info-box { border: 1px solid #444; border-radius: 8px; padding: 15px; background-color: #2d2d2d; min-height: 200px; }
        .info-box h2 { margin-top: 0; font-size: 1.1rem; color: #a371f7; border-bottom: 1px solid #555; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 15px; }
        table th, table td { border: 1px solid #555; padding: 8px 6px; text-align: left; }
        table th { background-color: #383838; color: #e0e0e0; font-weight: bold; }
        table tr:hover { background-color: #3d3d3d; }
        .placeholder-text { color: #aaa; font-size: 0.95rem; line-height: 1.5; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>온라인콘텐츠 활용 여부 기반 네트워크 뷰</h1>
        <div style="color: #a371f7; font-size: 0.9rem; font-weight: bold;">
            🟢 데이터 자동 연동 중...
        </div>
    </header>

    <div class="container">
        <div id="mindmap-area"></div>
        <div id="detail-area">
            <div class="info-box" id="infoBox">
                <h2>콘텐츠 상세 정보</h2>
                <div id="table-container">
                    <p class="placeholder-text" id="loading-text">
                        데이터를 불러오는 중입니다. 잠시만 기다려주세요...
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = echarts.init(document.getElementById('mindmap-area'));

        window.addEventListener('resize', function() {
            myChart.resize();
        });

        function buildGraphData(data) {
            let nodes = [];
            let links = [];
            let nodeMap = new Map();

            data.forEach((row, index) => {
                if (!row['콘텐츠명'] || row['콘텐츠명'].trim() === '') return;

                const rawAvail = row['공동활용가능여부'] || '아니오';
                const availLabel = rawAvail === '예' ? '공동활용 가능' : '공동활용 불가';
                
                const rawAi = row['AI교육여부'] || 'X';
                const aiLabel = `AI교육 ${rawAi} (${availLabel})`; 
                
                const contentName = row['콘텐츠명'];

                const availId = `avail_${availLabel}`;
                const aiId = `ai_${availLabel}_${rawAi}`;
                const contentId = `content_${index}`; 

                if (!nodeMap.has(availId)) {
                    nodes.push({ id: availId, name: availLabel, category: 0, symbolSize: 55 });
                    nodeMap.set(availId, true);
                }

                let aiNode = nodes.find(n => n.id === aiId);
                if (!aiNode) {
                    aiNode = { id: aiId, name: aiLabel, category: 1, symbolSize: 35, contentList: [] };
                    nodes.push(aiNode);
                    nodeMap.set(aiId, true);
                    links.push({ source: availId, target: aiId });
                }
                aiNode.contentList.push(row);

                if (!nodeMap.has(contentId)) {
                    nodes.push({ id: contentId, name: contentName, category: 2, value: row, symbolSize: 6 });
                    nodeMap.set(contentId, true);
                    links.push({ source: aiId, target: contentId });
                }
            });

            // 투명 링크 유지 (그룹 간 교차 방지)
            if (nodeMap.has('avail_공동활용 가능') && nodeMap.has('avail_공동활용 불가')) {
                links.push({
                    source: 'avail_공동활용 가능',
                    target: 'avail_공동활용 불가',
                    lineStyle: { width: 0, opacity: 0 } 
                });
            }

            return { nodes, links };
        }

        function renderGraph(graphData) {
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        if (params.data.category === 1) return params.name.split(' (')[0];
                        return params.name;
                    }
                },
                color: ['#a371f7', '#4facfe', '#f5576c'], 
                legend: {
                    data: ['공동활용 그룹', 'AI교육 여부', '콘텐츠'],
                    textStyle: { color: '#e0e0e0' },
                    bottom: 10
                },
                series: [
                    {
                        type: 'graph',
                        layout: 'force', 
                        data: graphData.nodes,
                        links: graphData.links,
                        categories: [
                            { name: '공동활용 그룹', label: { fontSize: 18, fontWeight: 'bold', color: '#fff' } },
                            { name: 'AI교육 여부', label: { fontSize: 14, fontWeight: 'bold' } },
                            { name: '콘텐츠', label: { fontSize: 8, color: '#666' } } 
                        ],
                        roam: true, 
                        draggable: true, 
                        label: {
                            show: true,
                            position: 'right',
                            formatter: function(params) {
                                if (params.data.category === 2 && params.name.length > 5) {
                                    return params.name.substring(0, 5) + '..';
                                }
                                if (params.data.category === 1) {
                                    return params.name.split(' (')[0]; 
                                }
                                return params.name;
                            }
                        },
                        emphasis: {
                            focus: 'adjacency', 
                            label: {
                                show: true,
                                fontSize: 13,
                                color: '#fff',
                                backgroundColor: 'rgba(0,0,0,0.7)',
                                padding: [4, 6],
                                borderRadius: 4,
                                formatter: function(params) {
                                    if (params.data.category === 1) return params.name.split(' (')[0];
                                    return params.name; 
                                }
                            }
                        },
                        force: {
                            repulsion: 900, 
                            edgeLength: [60, 150], 
                            gravity: 0.25 
                        },
                        lineStyle: {
                            color: 'source',
                            curveness: 0.2, 
                            opacity: 0.4 
                        }
                    }
                ]
            };

            myChart.setOption(option, true);
            myChart.hideLoading(); // 렌더링 끝나면 로딩 스피너 제거
        }

        myChart.on('click', function (params) {
            const nodeData = params.data;
            const tableContainer = document.getElementById('table-container');
            const infoBoxTitle = document.querySelector('#infoBox h2');

            if (nodeData.category === 1 && nodeData.contentList) {
                const displayName = nodeData.name.split(' (')[0] + " 콘텐츠 목록";
                infoBoxTitle.textContent = displayName + ` (총 ${nodeData.contentList.length}건)`;

                let tableHTML = '<table><thead><tr><th style="width: 15%;" class="text-center">연번</th><th>콘텐츠명</th><th style="width: 25%;">학문분류</th></tr></thead><tbody>';
                
                nodeData.contentList.forEach((row, index) => {
                    const contentName = row['콘텐츠명'] || '-';
                    const category = row['학문분류'] || '-';
                    tableHTML += `
                        <tr>
                            <td class="text-center">${index + 1}</td>
                            <td>${contentName}</td>
                            <td>${category}</td>
                        </tr>
                    `;
                });
                
                tableHTML += '</tbody></table>';
                tableContainer.innerHTML = tableHTML;
            }
            else if (nodeData.category === 2 && nodeData.value) {
                const detailData = nodeData.value;
                infoBoxTitle.textContent = "상세 정보 : " + nodeData.name;

                let tableHTML = '<table><tbody>';
                for (const key in detailData) {
                    if (detailData.hasOwnProperty(key)) {
                        const cellValue = detailData[key] ? detailData[key] : '-';
                        tableHTML += `
                            <tr>
                                <th style="width: 35%;">${key}</th>
                                <td>${cellValue}</td>
                            </tr>
                        `;
                    }
                }
                
                tableHTML += '</tbody></table>';
                tableContainer.innerHTML = tableHTML;
            }
        });

        // 🔥 웹페이지 로드 시 자동으로 CSV 파일을 다운로드 및 파싱
        window.addEventListener('DOMContentLoaded', () => {
            myChart.showLoading(); // 로딩 스피너 시작

            // 깃허브에 올릴 CSV 파일명 (반드시 영문명으로 변경하여 업로드하세요)
            const csvFilePath = 'data.csv'; 

            Papa.parse(csvFilePath, {
                download: true, // 로컬 파일이 아닌 경로에서 파일을 다운로드해서 읽음
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const csvData = results.data;
                    
                    // 우측 패널 안내 문구 업데이트
                    document.getElementById('table-container').innerHTML = `
                        <p class="placeholder-text" style="color:#a371f7; font-weight:bold;">
                            데이터 로드 완료! <br><br>
                            좌측 네트워크 그래프에서 노드를 클릭해 상세 정보를 확인하세요.
                        </p>
                    `;
                    
                    const graphData = buildGraphData(csvData);
                    renderGraph(graphData);
                },
                error: function(err) {
                    // 파일을 찾지 못하거나 오류가 났을 때의 처리
                    alert("데이터를 불러오는 중 오류가 발생했습니다. CSV 파일명(data.csv)과 경로를 확인해주세요.");
                    console.error(err);
                    myChart.hideLoading();
                    document.getElementById('loading-text').textContent = "데이터 로드 실패";
                }
            });
        });
    </script>
</body>
</html>
