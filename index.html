<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육혁신처 온라인콘텐츠 네트워크 시각화</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: #1e1e1e; }
        header { background-color: #2d2d2d; color: #e0e0e0; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        header h1 { margin: 0; font-size: 1.2rem; }
        .container { display: flex; flex: 1; overflow: hidden; }
        #mindmap-area { flex: 7; background-color: #1e1e1e; border-right: 1px solid #444; position: relative; }
        #detail-area { flex: 3; padding: 20px; background-color: #252525; color: #e0e0e0; overflow-y: auto; }
        .info-box { border: 1px solid #444; border-radius: 8px; padding: 15px; background-color: #2d2d2d; min-height: 200px; }
        .info-box h2 { margin-top: 0; font-size: 1.1rem; color: #a371f7; border-bottom: 1px solid #555; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 15px; }
        table th, table td { border: 1px solid #555; padding: 10px 8px; text-align: left; }
        table th { background-color: #383838; width: 35%; color: #e0e0e0; }
        table tr:hover { background-color: #3d3d3d; }
        .placeholder-text { color: #aaa; font-size: 0.95rem; line-height: 1.5; }
    </style>
</head>
<body>

    <header>
        <h1>온라인콘텐츠 네트워크(지식 그래프) 뷰</h1>
        <div>
            <label for="csvFileInput" style="margin-right: 10px; font-weight: bold; color: #a371f7;">CSV 데이터 업로드:</label>
            <input type="file" id="csvFileInput" accept=".csv" style="color: #fff;" />
        </div>
    </header>

    <div class="container">
        <div id="mindmap-area"></div>
        <div id="detail-area">
            <div class="info-box" id="infoBox">
                <h2>콘텐츠 상세 정보</h2>
                <div id="table-container">
                    <p class="placeholder-text">
                        1. 상단의 <b>[파일 선택]</b> 버튼으로 CSV를 업로드하세요.<br><br>
                        2. 마우스 휠로 확대/축소하고, 배경을 드래그해 이동할 수 있습니다.<br><br>
                        3. 노드를 마우스로 잡고 끌어당겨 보세요. (옵시디언 방식)<br><br>
                        4. 가장 끝단의 <b>[콘텐츠 노드]</b>를 클릭하면 상세 정보가 나타납니다.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = echarts.init(document.getElementById('mindmap-area'));

        window.addEventListener('resize', function() {
            myChart.resize();
        });

        function buildGraphData(data) {
            let nodes = [];
            let links = [];
            let nodeMap = new Map();

            function addNode(id, name, category, value = null, symbolSize = 20) {
                if (!nodeMap.has(id)) {
                    let node = { id: id, name: name, category: category, symbolSize: symbolSize };
                    if (value) node.value = value;
                    nodes.push(node);
                    nodeMap.set(id, true);
                }
            }

            function addLink(source, target) {
                links.push({ source: source, target: target });
            }

            const rootId = 'root';
            addNode(rootId, '온라인 콘텐츠', 0, null, 40);

            data.forEach((row, index) => {
                if (!row['콘텐츠명'] || row['콘텐츠명'].trim() === '') return;

                const avail = row['공동활용가능여부'] || '분류없음';
                const ai = row['AI교육여부'] || '분류없음';
                const contentName = row['콘텐츠명'];

                const availId = `avail_${avail}`;
                const aiId = `ai_${avail}_${ai}`;
                const contentId = `content_${index}`; 

                addNode(availId, avail, 1, null, 30);
                addLink(rootId, availId);

                addNode(aiId, ai, 2, null, 20);
                addLink(availId, aiId);

                // 🔥 3단계 노드 (콘텐츠명): 심볼 크기를 기존 15에서 5로 대폭 축소
                addNode(contentId, contentName, 3, row, 5);
                addLink(aiId, contentId);
            });

            return { nodes, links };
        }

        function renderGraph(graphData) {
            myChart.showLoading();
            
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{b}' // 툴팁에서는 전체 콘텐츠명 표시
                },
                color: ['#a371f7', '#4facfe', '#00f2fe', '#f5576c'],
                legend: {
                    data: ['루트', '공동활용', 'AI교육', '콘텐츠'],
                    textStyle: { color: '#e0e0e0' },
                    bottom: 10
                },
                series: [
                    {
                        type: 'graph',
                        layout: 'force', 
                        data: graphData.nodes,
                        links: graphData.links,
                        // 🔥 카테고리별로 라벨(글씨) 크기를 세밀하게 조정
                        categories: [
                            { name: '루트', label: { fontSize: 16, fontWeight: 'bold' } },
                            { name: '공동활용', label: { fontSize: 14, fontWeight: 'bold' } },
                            { name: 'AI교육', label: { fontSize: 13 } },
                            { name: '콘텐츠', label: { fontSize: 10, color: '#999' } } // 끝단 콘텐츠 글씨 크기 10으로 축소 및 색상 톤다운
                        ],
                        roam: true, 
                        draggable: true, 
                        label: {
                            show: true,
                            position: 'right',
                            formatter: function(params) {
                                // 🔥 글자가 10자를 넘어가면 말줄임표(...) 처리하여 겹침 방지
                                if (params.data.category === 3 && params.name.length > 10) {
                                    return params.name.substring(0, 10) + '...';
                                }
                                return params.name;
                            }
                        },
                        force: {
                            // 🔥 반발력 대폭 증가 (300 -> 800) : 노드들이 훨씬 멀리 퍼집니다.
                            repulsion: 800, 
                            // 🔥 선 길이 증가 : 좁은 공간에 뭉치는 것을 방지
                            edgeLength: [80, 250], 
                            // 🔥 중력 감소 (0.1 -> 0.05) : 중앙으로 모이려는 성질을 약화시킴
                            gravity: 0.05 
                        },
                        lineStyle: {
                            color: 'source',
                            curveness: 0.2, 
                            opacity: 0.4 // 선의 투명도를 낮춰 덜 복잡해 보이게 수정
                        }
                    }
                ]
            };

            myChart.setOption(option, true);
            myChart.hideLoading();
        }

        myChart.on('click', function (params) {
            const nodeData = params.data;

            if (nodeData && nodeData.value) {
                const detailData = nodeData.value;
                const tableContainer = document.getElementById('table-container');
                const infoBoxTitle = document.querySelector('#infoBox h2');

                infoBoxTitle.textContent = "상세 정보 : " + nodeData.name;

                let tableHTML = '<table><tbody>';
                
                for (const key in detailData) {
                    if (detailData.hasOwnProperty(key)) {
                        const cellValue = detailData[key] ? detailData[key] : '-';
                        tableHTML += `
                            <tr>
                                <th>${key}</th>
                                <td>${cellValue}</td>
                            </tr>
                        `;
                    }
                }
                
                tableHTML += '</tbody></table>';
                tableContainer.innerHTML = tableHTML;
            }
        });

        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.querySelector('#infoBox h2').textContent = "콘텐츠 상세 정보";
            document.getElementById('table-container').innerHTML = '<p class="placeholder-text" style="color:#a371f7; font-weight:bold;">데이터 렌더링 완료! 마우스 휠을 굴려 확대/축소해 보세요.</p>';

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const csvData = results.data;
                    const graphData = buildGraphData(csvData);
                    renderGraph(graphData);
                },
                error: function(err) {
                    alert("파일을 읽는 중 오류가 발생했습니다.");
                    console.error(err);
                }
            });
        });
    </script>
</body>
</html>
